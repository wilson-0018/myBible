<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
<title>圣经学习 - Bible Study</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', sans-serif;
    background: #f5f0e8;
    color: #2c2c2c;
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    text-align: center;
  }
  h1 {
    font-size: 32px;
    color: #5b3a1a;
    letter-spacing: 4px;
    margin-top: 40px;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 15px;
    color: #aaa;
    margin-bottom: 40px;
  }
  .intro {
    font-size: 14px;
    color: #888;
    line-height: 1.8;
    margin-bottom: 32px;
    padding: 0 10px;
  }

  .book-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 40px;
  }

  .book-card {
    display: flex;
    align-items: center;
    background: #fff;
    border: 2px solid #d4b896;
    border-radius: 14px;
    padding: 18px 22px;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s;
    text-align: left;
    gap: 16px;
    cursor: pointer;
  }
  .book-card:hover {
    border-color: #8b5e3c;
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  }

  .book-icon {
    font-size: 32px;
    min-width: 44px;
    text-align: center;
  }
  .book-info { flex: 1; }
  .book-title {
    font-size: 18px;
    font-weight: 700;
    color: #3a2a1a;
    margin-bottom: 2px;
  }
  .book-title .arrow {
    font-size: 13px;
    color: #b8926c;
    margin-left: 6px;
    transition: margin 0.2s;
  }
  .book-card:hover .arrow {
    margin-left: 10px;
  }
  .book-desc {
    font-size: 13px;
    color: #999;
    line-height: 1.4;
  }
  .book-tag {
    display: inline-block;
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 12px;
    margin-top: 4px;
  }
  .tag-gold { background: #f5ede4; color: #8b5e3c; }
  .tag-green { background: #eef5ee; color: #3a7a3a; }

  .footer {
    font-size: 12px;
    color: #ccc;
    margin-top: 20px;
    padding-bottom: 30px;
  }

  /* ===== 弹窗 ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(30,20,10,0.55);
    z-index: 1000;
    padding: 20px;
    overflow-y: auto;
    cursor: pointer;
  }
  .modal-overlay.active { display: flex; align-items: center; justify-content: center; }
  .modal-box {
    background: #fcf9f5;
    border-radius: 16px;
    max-width: 600px;
    width: 100%;
    padding: 32px 30px;
    cursor: default;
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal-close {
    position: absolute; top: 14px; right: 18px;
    font-size: 24px; color: #bbb; cursor: pointer;
    background: none; border: none; line-height: 1;
  }
  .modal-close:hover { color: #666; }
  .modal-title {
    font-size: 22px;
    font-weight: 700;
    color: #5b3a1a;
    margin-bottom: 16px;
    border-bottom: 2px solid #d4b896;
    padding-bottom: 12px;
  }
  .modal-section {
    margin-bottom: 20px;
  }
  .modal-section h3 {
    font-size: 15px;
    font-weight: 600;
    color: #8b5e3c;
    margin-bottom: 8px;
  }
  .modal-section p {
    font-size: 14px;
    color: #444;
    line-height: 1.8;
  }
  .verse-card {
    background: #f5ede4;
    border-left: 4px solid #8b5e3c;
    padding: 12px 16px;
    margin-bottom: 12px;
    border-radius: 0 8px 8px 0;
  }
  .verse-text {
    font-size: 14px;
    color: #3a2a1a;
    line-height: 1.7;
    font-style: italic;
  }
  .verse-ref {
    font-size: 12px;
    color: #8b5e3c;
    font-weight: 600;
    margin-top: 4px;
    display: block;
  }
  .modal-hint {
    font-size: 12px;
    color: #bbb;
    text-align: center;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid #eee;
  }
</style>
</head>

    <a class="book-card" href="bible-genealogy3.html">
      <div class="book-icon">👥</div>

  </div>

  <div class="footer">
    依据马太福音 &amp; 路加福音 ｜ 持续更新中

</div>

</html>
