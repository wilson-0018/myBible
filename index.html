<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
<title>圣经学习 - Bible Study</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', sans-serif;
    background: #f5f0e8;
    color: #2c2c2c;
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    text-align: center;
  }
  h1 {
    font-size: 32px;
    color: #5b3a1a;
    letter-spacing: 4px;
    margin-top: 40px;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 15px;
    color: #aaa;
    margin-bottom: 40px;
  }
  .intro {
    font-size: 14px;
    color: #888;
    line-height: 1.8;
    margin-bottom: 32px;
    padding: 0 10px;
  }

  .book-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 40px;
  }

  .book-card {
    display: flex;
    align-items: center;
    background: #fff;
    border: 2px solid #d4b896;
    border-radius: 14px;
    padding: 18px 22px;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s;
    text-align: left;
    gap: 16px;
  }
  .book-card:hover {
    border-color: #8b5e3c;
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  }

  .book-icon {
    font-size: 32px;
    min-width: 44px;
    text-align: center;
  }

  .book-info {
    flex: 1;
  }
  .book-title {
    font-size: 18px;
    font-weight: 700;
    color: #3a2a1a;
    margin-bottom: 2px;
  }
  .book-desc {
    font-size: 13px;
    color: #999;
    line-height: 1.4;
  }
  .book-tag {
    display: inline-block;
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 12px;
    margin-top: 4px;
  }
  .tag-gold { background: #f5ede4; color: #8b5e3c; }
  .tag-green { background: #eef5ee; color: #3a7a3a; }

  .footer {
    font-size: 12px;
    color: #ccc;
    margin-top: 20px;
    padding-bottom: 30px;
  }
</style>
</head>
<body>

<div class="container">
  <h1>📖 圣经学习</h1>
  <p class="subtitle">Bible Study</p>

  <p class="intro">
    从创世记到启示录，探索圣经中的人物、谱系与智慧。<br>
    持续更新中……
  </p>

  <div class="book-list">

    <a class="book-card" href="bible-books.html">
      <div class="book-icon">📚</div>
      <div class="book-info">
        <div class="book-title">圣经各卷书</div>
        <div class="book-desc">英汉对照 · 国际音标 · 点击听发音</div>
        <span class="book-tag tag-gold">66卷全收录</span>
      </div>
    </a>

    <a class="book-card" href="bible-genealogy.html">
      <div class="book-icon">👑</div>
      <div class="book-info">
        <div class="book-title">圣经人物关系 1</div>
        <div class="book-desc">亚伯拉罕 → 大卫 · 族谱图解 · 实线血缘 · 虚线夫妻</div>
        <span class="book-tag tag-gold">14代谱系</span>
      </div>
    </a>

    <a class="book-card" href="bible-genealogy2.html">
      <div class="book-icon">✝️</div>
      <div class="book-info">
        <div class="book-title">圣经人物关系 2</div>
        <div class="book-desc">大卫王 → 耶稣基督 · 犹大列王 · 两约之间</div>
        <span class="book-tag tag-green">弥赛亚谱系</span>
      </div>
    </a>

  </div>

  <div class="footer">
    依据马太福音 &amp; 路加福音 ｜ 持续更新中
  </div>
</div>

</body>
</html>
